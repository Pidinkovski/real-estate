<svg width="330" height="72" viewBox="0 0 330 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VS Studio</title>
  <desc id="desc">Compact VS Studio logo for the website navigation bar.</desc>
  <defs>
